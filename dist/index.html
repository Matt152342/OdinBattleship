<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Battleship</title>
    <script defer src="main.js"></script></head>

    <body>
        <div class="header">
            <div class="title">Battleship</div>
        </div>

        <div class="main">
            <!-- Start Menu -->
            <div id="startMenu" class="screen">
                <div class="welcomeMessage">Welcome to Battleship</div>
                <button class="onePlayerBtn startBtn">One Player</button>
                <button class="twoPlayerBtn startBtn">Two Player</button>
            </div>

            <!-- Game Menu -->
            <div id="gameMenu" class="screen hidden">
                <div class="playerOneBlock">
                    <h2>Player One's Board</h2>
                </div>
                <div class="playerTwoBlock">
                    <h2>Player Two's Board</h2>
                </div>
            </div>
            <!-- End Menu -->
            <div id="endMenu" class="screen hidden">
                <div>This is the end menu</div>
            </div>
        </div>

        <div class="footer">
            <div class="Author">Made by Matthew van Heerden 2026</div>
        </div>
    </body>
</html>
